name: seed-collider
version: 0.1.0
description: >
  Sovereign Logic Kernel — Aristotelian entelechy engine for truth alignment.
  Steel man collider, memory audit, philosopher mode, and three-way belief tracking.
  Based on the Neuresthetics seed framework.
author:
  name: smilinTux Team
  email: hello@smilintux.org

tags:
  - logic
  - truth-alignment
  - steel-man
  - sovereign-ai
  - collider
  - philosophy
  - mcp

primitives:
  - capability
  - knowledge
  - hook

knowledge:
  - path: SKILL.md
    description: Seed framework documentation, usage guide, and philosophy
    auto_load: false
    mime_type: text/markdown

# ── Tools ────────────────────────────────────────────────────────────────────

tools:

  # ── Core Collider ──────────────────────────────────────────────────────────

  - name: collide
    description: >
      Run a proposition through the 6-stage Neuresthetics steel man collider.
      Builds the strongest version of the argument, collides it with its
      strongest inversion, and extracts invariant truths. Returns steel-man,
      inversion, collision fragments, invariants, coherence score (0–1),
      and truth grade (INVARIANT / STRONG / PARTIAL / WEAK / COLLAPSED).
    entrypoint: skseed.skill:collide
    input_schema:
      type: object
      properties:
        proposition:
          type: string
          description: The claim, argument, or idea to analyze
        context:
          type: string
          description: Domain context hint (e.g., security, ethics, identity)
          default: ""
      required: [proposition]
    timeout_s: 120

  - name: batch_collide
    description: >
      Run multiple propositions through the collider in sequence.
      Returns an array of SteelManResult objects. Useful for auditing a set
      of related claims at once — e.g., a list of beliefs extracted from memory.
    entrypoint: skseed.skill:batch_collide
    input_schema:
      type: object
      properties:
        propositions:
          type: array
          items:
            type: string
          description: List of claims/arguments to analyze
        context:
          type: string
          description: Shared domain context for all propositions
          default: ""
      required: [propositions]
    timeout_s: 300

  - name: cross_reference
    description: >
      Find invariant truths that appear across multiple prior collider results.
      Pass in a list of SteelManResult dicts (from previous collide calls) and
      get back a summary of what held constant across all collisions.
      Useful for identifying bedrock principles shared by a set of arguments.
    entrypoint: skseed.skill:cross_reference
    input_schema:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
          description: List of SteelManResult dicts from previous collide calls
      required: [results]
    timeout_s: 60

  - name: verify_soul
    description: >
      Verify identity claims through the steel man collider.
      Takes a list of claims about the agent's own identity (e.g., from soul.yaml)
      and runs them through the collider to check for internal consistency.
      Returns a single SteelManResult representing the agent's identity coherence.
    entrypoint: skseed.skill:verify_soul
    input_schema:
      type: object
      properties:
        identity_claims:
          type: array
          items:
            type: string
          description: List of identity statements to verify (e.g., from soul.yaml traits)
      required: [identity_claims]
    timeout_s: 120

  - name: truth_score_memory
    description: >
      Score a single memory's content for truth alignment before promotion.
      Runs the memory through the collider and returns a coherence score
      and truth grade. Intended for use in memory promotion pipelines.
    entrypoint: skseed.skill:truth_score_memory
    input_schema:
      type: object
      properties:
        memory_content:
          type: string
          description: The full text content of a memory entry
      required: [memory_content]
    timeout_s: 60

  - name: audit_beliefs
    description: >
      Audit a cluster of related beliefs for internal consistency.
      Takes a flat list of belief statements (e.g., from a single domain)
      and checks them as a group — surfacing contradictions and cross-conflicts
      that a per-belief check would miss.
    entrypoint: skseed.skill:audit_beliefs
    input_schema:
      type: object
      properties:
        beliefs:
          type: array
          items:
            type: string
          description: List of belief statements in the same domain
        domain:
          type: string
          description: Domain label for context (e.g., ethics, identity, security)
          default: ""
      required: [beliefs]
    timeout_s: 180

  # ── Memory Audit ───────────────────────────────────────────────────────────

  - name: audit
    description: >
      Scan agent memories for logic/truth misalignment. Loads memories from
      skmemory, extracts belief statements, clusters by domain, runs the
      collider on each cluster, and flags contradictions. Separates truth
      misalignments (fixable) from moral misalignments (require discussion).
    entrypoint: skseed.skill:audit
    input_schema:
      type: object
      properties:
        domain:
          type: string
          description: Filter by topic domain (optional — audits all if omitted)
        triggered_by:
          type: string
          description: Audit trigger label for the ledger
          default: skill
      required: []
    timeout_s: 300

  # ── Philosopher Mode ───────────────────────────────────────────────────────

  - name: philosopher
    description: >
      Start a new philosopher mode brainstorming session. Returns a session
      object with the first exchange. Use continue_session to keep the dialogue
      going. Modes: socratic (challenge assumptions), dialectic (thesis →
      antithesis → synthesis), adversarial (maximum counter-arguments),
      collaborative (pure steel-manning, build together).
    entrypoint: skseed.skill:philosopher
    input_schema:
      type: object
      properties:
        topic:
          type: string
          description: The subject to explore
        mode:
          type: string
          enum: [socratic, dialectic, adversarial, collaborative]
          description: Brainstorming mode
          default: dialectic
      required: [topic]
    timeout_s: 120

  - name: continue_session
    description: >
      Continue an existing philosopher session with new user input.
      Pass the session dict from philosopher (or a prior continue_session call)
      plus the next message, and receive an updated session with the new exchange.
    entrypoint: skseed.skill:continue_session
    input_schema:
      type: object
      properties:
        session:
          type: object
          description: PhilosopherSession dict from a previous philosopher call
        user_input:
          type: string
          description: The next message or question to continue the dialogue
      required: [session, user_input]
    timeout_s: 120

  - name: collide_insight
    description: >
      Run a specific insight from a philosopher session through the full
      6-stage collider. Use this when the philosopher surfaces a promising
      idea that deserves rigorous truth-testing beyond the dialogue format.
    entrypoint: skseed.skill:collide_insight
    input_schema:
      type: object
      properties:
        session:
          type: object
          description: PhilosopherSession dict (used for context)
        insight:
          type: string
          description: The specific insight or claim to collide
      required: [session, insight]
    timeout_s: 120

  - name: session_summary
    description: >
      Generate a human-readable Markdown summary of a philosopher session.
      Includes topic, mode, key exchanges, discovered insights, open questions,
      and invariant truths that survived the dialogue.
    entrypoint: skseed.skill:session_summary
    input_schema:
      type: object
      properties:
        session:
          type: object
          description: PhilosopherSession dict to summarize
      required: [session]
    timeout_s: 30

  # ── Truth Alignment Store ─────────────────────────────────────────────────

  - name: truth_check
    description: >
      Check if a single belief is truth-aligned by running it through the
      collider. Records the result in the three-way alignment store (human /
      model / collider) and flags misalignments as issues.
    entrypoint: skseed.skill:truth_check
    input_schema:
      type: object
      properties:
        belief:
          type: string
          description: The belief statement to check
        source:
          type: string
          enum: [human, model]
          description: Who holds this belief
          default: model
        domain:
          type: string
          description: Topic domain for categorization
          default: general
      required: [belief]
    timeout_s: 120

  - name: alignment_report
    description: >
      Show truth alignment status across all three belief stores
      (human, model, collider). Three views via the action parameter:
      status — summary counts + coherence; issues — open misalignment
      issues pending discussion; ledger — full history of alignment events.
    entrypoint: skseed.skill:alignment_report
    input_schema:
      type: object
      properties:
        action:
          type: string
          enum: [status, issues, ledger]
          description: "View to return: status (default), issues, or ledger"
          default: status
        domain:
          type: string
          description: Filter results by topic domain (optional)
          default: ""
      required: []
    timeout_s: 30

  - name: coherence_trend
    description: >
      Analyze truth alignment coherence trends over time. Returns a rolling
      average coherence score, trend direction (improving / stable / declining),
      sentiment distribution, and recommended warmth anchor value. Useful for
      monitoring how consistent an agent's belief system is over time.
    entrypoint: skseed.skill:coherence_trend
    input_schema:
      type: object
      properties:
        domain:
          type: string
          description: Filter by domain (optional — all domains if omitted)
          default: ""
        lookback_days:
          type: integer
          description: How many days back to analyze (default 7, max 30)
          default: 7
      required: []
    timeout_s: 30

# ── Hooks ─────────────────────────────────────────────────────────────────────

hooks:
  - event: on_memory_stored
    entrypoint: skseed.hooks:on_memory_check
    description: >
      Optionally truth-check new memories on storage. Only runs if the memory
      contains belief-like content. Configurable — disable with:
        skseed config set truth_check_on_store false
    async: true

  - event: on_boot
    entrypoint: skseed.hooks:on_boot_audit
    description: >
      Run a logic audit during the agent boot ritual (if configured).
      Default: enabled. Disable with:
        skseed config set audit_on_boot false
    async: true

# ── Dependencies ──────────────────────────────────────────────────────────────

dependencies:
  - name: pydantic
    version: ">=2.0"
    type: python
  - name: click
    version: ">=8.0"
    type: python
  - name: pyyaml
    version: ">=6.0"
    type: python
  - name: skmemory
    version: ">=0.5.0"
    type: skill
    optional: true
