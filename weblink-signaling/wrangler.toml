name = "weblink-signaling"
main = "cloudflare/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Worker account settings — set CF_ACCOUNT_ID in GitHub Actions secrets / local env
account_id = "${CF_ACCOUNT_ID}"

[vars]
# Default: allow all origins. Override per-environment below.
ALLOWED_ORIGINS = "*"
# CapAuth bearer token enforcement. Set to "true" to require a valid token.
CAPAUTH_REQUIRE_AUTH = "false"
# Room TTL hint (informational — actual TTL is the ROOM_TTL_MS constant in worker.ts).
ROOM_TTL_HOURS = "24"

# ── Durable Objects ───────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[migrations]]
tag = "v1"
new_classes = ["SignalingRoom"]

# v2: room persistence (room:state KV, icebuf:* KV) + DO alarm (24h TTL)
# No class-level change; migration tag documents the storage schema bump.
[[migrations]]
tag = "v2"
new_sqlite_classes = []

# ── Routes ────────────────────────────────────────────────────────────────────
[[routes]]
pattern = "ws.weblink.skworld.io/*"
zone_name = "skworld.io"

# ── Production environment ────────────────────────────────────────────────────
[env.production]
vars = { ALLOWED_ORIGINS = "https://skworld.io,https://skchat.skworld.io,https://weblink.skworld.io" }

# ── Development environment ───────────────────────────────────────────────────
[env.dev]
vars = { ALLOWED_ORIGINS = "*" }

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
# TypeScript is compiled automatically by wrangler
# command = ""

# ── Observability ─────────────────────────────────────────────────────────────
[observability]
enabled = true
