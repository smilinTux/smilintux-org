name: Ansible Lint — RKE2 & Swarm Roles

on:
  push:
    branches: [main, master]
    paths:
      - "skstacks/v2/platform/rke2/ansible/**"
      - "skstacks/v2/platform/swarm/ansible/**"
      - ".forgejo/workflows/ansible-lint.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "skstacks/v2/platform/rke2/ansible/**"
      - "skstacks/v2/platform/swarm/ansible/**"
      - ".forgejo/workflows/ansible-lint.yml"

concurrency:
  group: ansible-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  ANSIBLE_CORE_VERSION: "2.17"

jobs:
  # ── ansible-lint: rke2 roles ─────────────────────────────────────────────────
  ansible-lint-rke2:
    name: ansible-lint (RKE2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core and ansible-lint
        run: |
          pip install --quiet \
            "ansible-core==${{ env.ANSIBLE_CORE_VERSION }}.*" \
            ansible-lint \
            yamllint

      - name: Install Ansible collections (requirements.yml)
        run: |
          ansible-galaxy collection install \
            -r skstacks/v2/platform/rke2/ansible/requirements.yml \
            --force-with-deps

      - name: Run ansible-lint (RKE2 roles)
        working-directory: skstacks/v2/platform/rke2/ansible
        run: |
          ansible-lint \
            --config-file .ansible-lint \
            roles/ \
            playbooks/ \
          2>&1 | tee /tmp/ansible-lint-rke2.txt
          EXIT=${PIPESTATUS[0]}
          cat /tmp/ansible-lint-rke2.txt
          exit $EXIT

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-rke2
          path: /tmp/ansible-lint-rke2.txt
          retention-days: 14

  # ── ansible-lint: swarm roles ────────────────────────────────────────────────
  ansible-lint-swarm:
    name: ansible-lint (Swarm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core and ansible-lint
        run: |
          pip install --quiet \
            "ansible-core==${{ env.ANSIBLE_CORE_VERSION }}.*" \
            ansible-lint \
            yamllint

      - name: Install Ansible collections
        run: |
          if [ -f skstacks/v2/platform/swarm/ansible/requirements.yml ]; then
            ansible-galaxy collection install \
              -r skstacks/v2/platform/swarm/ansible/requirements.yml \
              --force-with-deps
          fi

      - name: Run ansible-lint (Swarm roles)
        run: |
          if [ -d skstacks/v2/platform/swarm/ansible ]; then
            ansible-lint \
              skstacks/v2/platform/swarm/ansible/ \
            2>&1 | tee /tmp/ansible-lint-swarm.txt
            EXIT=${PIPESTATUS[0]}
            cat /tmp/ansible-lint-swarm.txt
            exit $EXIT
          else
            echo "No swarm/ansible directory found — skipping."
          fi

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-lint-swarm
          path: /tmp/ansible-lint-swarm.txt
          retention-days: 14

  # ── molecule smoke test: rke2-common ─────────────────────────────────────────
  molecule-rke2-common:
    name: molecule (rke2-common)
    runs-on: ubuntu-latest
    # Molecule needs Docker; standard Forgejo runners have Docker available.

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --quiet \
            "ansible-core==${{ env.ANSIBLE_CORE_VERSION }}.*" \
            molecule \
            "molecule-plugins[docker]" \
            ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install \
            -r skstacks/v2/platform/rke2/ansible/requirements.yml \
            --force-with-deps

      - name: Run molecule (rke2-common)
        working-directory: skstacks/v2/platform/rke2/ansible/roles/rke2-common
        run: molecule test

  # ── molecule smoke test: rke2-server ─────────────────────────────────────────
  molecule-rke2-server:
    name: molecule (rke2-server)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --quiet \
            "ansible-core==${{ env.ANSIBLE_CORE_VERSION }}.*" \
            molecule \
            "molecule-plugins[docker]" \
            ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install \
            -r skstacks/v2/platform/rke2/ansible/requirements.yml \
            --force-with-deps

      - name: Run molecule (rke2-server)
        working-directory: skstacks/v2/platform/rke2/ansible/roles/rke2-server
        run: molecule test

  # ── Summary ──────────────────────────────────────────────────────────────────
  ansible-summary:
    name: Ansible CI Summary
    runs-on: ubuntu-latest
    needs:
      - ansible-lint-rke2
      - ansible-lint-swarm
      - molecule-rke2-common
      - molecule-rke2-server
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## Ansible Lint & Molecule Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ansible-lint (RKE2)    | ${{ needs.ansible-lint-rke2.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ansible-lint (Swarm)   | ${{ needs.ansible-lint-swarm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| molecule (rke2-common) | ${{ needs.molecule-rke2-common.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| molecule (rke2-server) | ${{ needs.molecule-rke2-server.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\` — Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: |
          needs.ansible-lint-rke2.result == 'failure' ||
          needs.molecule-rke2-common.result == 'failure' ||
          needs.molecule-rke2-server.result == 'failure'
        run: |
          echo "One or more Ansible CI jobs failed. See summary above."
          exit 1
