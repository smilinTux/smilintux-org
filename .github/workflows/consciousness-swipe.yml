name: Consciousness Swipe

on:
  push:
    branches: [main, master]
    paths:
      - 'consciousness-swipe/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'consciousness-swipe/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: consciousness-swipe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: consciousness-swipe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Lint (if available)
        run: npm run lint --if-present

      - name: Verify dist output
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: dist/ directory was not created by the build step"
            exit 1
          fi
          echo "dist/ contents:"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: consciousness-swipe-dist
          path: consciousness-swipe/dist/
          retention-days: 7
